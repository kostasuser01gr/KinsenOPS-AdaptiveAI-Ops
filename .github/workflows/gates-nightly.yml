name: Black Vault Nightly Hardening

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  nightly:
    name: Full Gate Suite
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install hardening toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep zsh
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/hardening/build-inventory.sh
      - run: bash scripts/run-all-gates.sh
      - run: bash scripts/ci/record-metrics.sh
      - run: bash scripts/github-cli/generate-compliance-report.sh
      - run: bash scripts/github-cli/sync-findings.sh .
        continue-on-error: true
      - run: bash scripts/github-cli/update-project.sh .
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-hardening-${{ github.run_id }}
          path: |
            artifacts/
            coverage/
            .black-vault/
            BLACK_VAULT_HARDENING_REPORT.md
          retention-days: 90
