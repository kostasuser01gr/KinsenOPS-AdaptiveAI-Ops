name: Black Vault Gates (PR)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Build (G1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G1
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-g1
          path: artifacts/
          retention-days: 30

  lint:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Lint (G2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G2
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-g2
          path: artifacts/
          retention-days: 30

  typecheck:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Typecheck (G3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G3
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-g3
          path: artifacts/
          retention-days: 30

  test:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Test (G4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G4
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-g4
          path: artifacts/
          retention-days: 30

  e2e:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: E2E (G5)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: adaptiveai_closure_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adaptiveai_closure_test
      SESSION_SECRET: closure-test-secret
      NODE_ENV: development
      SEED_DATABASE: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: npx playwright install chromium
      - run: npx drizzle-kit push --force
      - name: Create session table (not in Drizzle schema)
        run: |
          psql "$DATABASE_URL" -c "
            CREATE TABLE IF NOT EXISTS user_sessions (
              sid VARCHAR NOT NULL PRIMARY KEY,
              sess JSON NOT NULL,
              expire TIMESTAMP(6) NOT NULL
            );
            CREATE INDEX IF NOT EXISTS idx_user_sessions_expire ON user_sessions (expire);
          "
      - run: bash scripts/ci/run-gates.sh G5
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-g5
          path: |
            artifacts/
            e2e-report/
          retention-days: 30

  coverage:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Coverage (G6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G6
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-g6
          path: |
            artifacts/
            coverage/
          retention-days: 30

  audit:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Audit (G8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/ci/setup-toolchain.sh nodejs
      - run: bash scripts/ci/run-gates.sh G8
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-g8
          path: artifacts/
          retention-days: 30

  sast:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: SAST (G9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/ci/run-gates.sh G9
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sast-g9
          path: artifacts/
          retention-days: 30

  secrets:
    if: github.event_name == 'pull_request' || vars.RUN_BLACK_VAULT_GATES == 'true'
    name: Secrets (G10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: bash scripts/ci/run-gates.sh G10
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: secrets-g10
          path: artifacts/
          retention-days: 30

  gate-summary:
    name: Gate Summary
    if: always()
    needs: [build, lint, typecheck, test, e2e, coverage, audit, sast, secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ vars.RUN_BLACK_VAULT_GATES }}" != "true" ]]; then
            echo "Black Vault gates skipped on push; set RUN_BLACK_VAULT_GATES=true to opt in."
            exit 0
          fi
          echo "Build: ${{ needs.build.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "E2E: ${{ needs.e2e.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Audit: ${{ needs.audit.result }}"
          echo "SAST: ${{ needs.sast.result }}"
          echo "Secrets: ${{ needs.secrets.result }}"
          if [[ "${{ needs.build.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" || \
                "${{ needs.coverage.result }}" != "success" || \
                "${{ needs.audit.result }}" != "success" || \
                "${{ needs.sast.result }}" != "success" || \
                "${{ needs.secrets.result }}" != "success" ]]; then
            exit 1
          fi
